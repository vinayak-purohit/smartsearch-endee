services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""   # Leave empty for no auth (development mode)
    volumes:
      - endee-data:/data
    restart: unless-stopped

volumes:
  endee-data:
