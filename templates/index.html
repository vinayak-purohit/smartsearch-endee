<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartSearch — AI Semantic Search powered by Endee</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #07080a;
    --surface:   #0e1014;
    --border:    #1e2228;
    --accent:    #00e5ff;
    --accent2:   #7c3aed;
    --green:     #00ff88;
    --text:      #c8d0e0;
    --muted:     #4a5568;
    --card-bg:   #111318;
    --highlight: rgba(0,229,255,.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid background ───────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ────────────────────────────────────────────────── */
  .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px; position: relative; z-index: 1; }

  /* ── Header ────────────────────────────────────────────────── */
  header { margin-bottom: 48px; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); border: 1px solid rgba(0,229,255,.25);
    padding: 4px 12px; border-radius: 2px; margin-bottom: 20px;
    background: rgba(0,229,255,.04);
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,255,136,.4); }
    50%      { opacity:.7; box-shadow: 0 0 0 6px rgba(0,255,136,0); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.1;
    color: #fff;
  }
  h1 span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .sub {
    margin-top: 12px; color: var(--muted); font-size: 13px; max-width: 520px; line-height: 1.7;
  }

  /* ── Mode tabs ─────────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 0; border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; margin-bottom: 24px;
    width: fit-content;
  }
  .tab {
    padding: 10px 24px; font: 600 12px/1 'JetBrains Mono', monospace;
    letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
    border: none; background: transparent; color: var(--muted);
    transition: all .2s; border-right: 1px solid var(--border);
  }
  .tab:last-child { border-right: none; }
  .tab.active {
    background: rgba(0,229,255,.1); color: var(--accent);
  }
  .tab:hover:not(.active) { color: var(--text); background: var(--highlight); }

  /* ── Search bar ────────────────────────────────────────────── */
  .search-row { display: flex; gap: 10px; margin-bottom: 32px; }

  .input-wrap { flex: 1; position: relative; }
  .input-wrap::before {
    content: '›'; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--accent); font-size: 20px; pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: #fff;
    font: 400 14px/1 'JetBrains Mono', monospace;
    padding: 16px 16px 16px 40px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    caret-color: var(--accent);
  }
  input:focus {
    border-color: rgba(0,229,255,.5);
    box-shadow: 0 0 0 3px rgba(0,229,255,.08), 0 0 20px rgba(0,229,255,.05);
  }
  input::placeholder { color: var(--muted); }

  .btn {
    padding: 16px 28px;
    background: var(--accent); color: #000;
    font: 700 12px/1 'JetBrains Mono', monospace;
    letter-spacing: .1em; text-transform: uppercase;
    border: none; border-radius: 4px; cursor: pointer;
    transition: all .2s; white-space: nowrap;
  }
  .btn:hover { background: #33ecff; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,229,255,.3); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Stats bar ─────────────────────────────────────────────── */
  .stats-bar {
    display: flex; gap: 24px; margin-bottom: 32px;
    padding: 12px 20px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    font-size: 11px; color: var(--muted); letter-spacing: .06em;
  }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-label { text-transform: uppercase; font-size: 10px; letter-spacing: .12em; }
  .stat-value { color: var(--accent); font-weight: 600; }

  /* ── Results ───────────────────────────────────────────────── */
  .results { display: flex; flex-direction: column; gap: 12px; }

  .result-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    transition: border-color .2s, transform .15s;
    animation: slideIn .3s ease both;
  }
  .result-card:hover { border-color: rgba(0,229,255,.25); transform: translateX(3px); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 15px;
    color: #fff; line-height: 1.3;
  }

  .score-pill {
    flex-shrink: 0;
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    padding: 3px 10px; border-radius: 2px;
  }
  .score-high  { background: rgba(0,255,136,.12); color: var(--green); border: 1px solid rgba(0,255,136,.2); }
  .score-med   { background: rgba(0,229,255,.10); color: var(--accent); border: 1px solid rgba(0,229,255,.2); }
  .score-low   { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }

  .card-content { font-size: 13px; color: var(--text); line-height: 1.7; }

  .card-footer { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .cat-tag {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent2); border: 1px solid rgba(124,58,237,.25);
    background: rgba(124,58,237,.07); padding: 2px 8px; border-radius: 2px;
  }
  .doc-id { font-size: 10px; color: var(--muted); }

  /* ── RAG answer box ────────────────────────────────────────── */
  .rag-answer {
    background: var(--surface);
    border: 1px solid rgba(0,229,255,.2);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 24px;
    animation: slideIn .3s ease;
  }
  .rag-label {
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .rag-label::before { content: '⬡'; font-size: 14px; }
  .rag-text { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-line; }
  .rag-text strong { color: #fff; }

  .sources-label {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin: 24px 0 12px;
  }

  /* ── Loading ───────────────────────────────────────────────── */
  .loading {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    padding: 64px; color: var(--muted); font-size: 13px;
  }
  .spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty / Error ─────────────────────────────────────────── */
  .empty {
    padding: 64px; text-align: center; color: var(--muted); font-size: 13px; line-height: 2;
  }
  .empty-icon { font-size: 32px; display: block; margin-bottom: 12px; }
  .error-msg { color: #ff4444; background: rgba(255,68,68,.08); border: 1px solid rgba(255,68,68,.2); padding: 16px 20px; border-radius: 4px; font-size: 13px; }

  /* ── Scrollbar ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="badge"><span class="badge-dot"></span> Powered by Endee Vector DB</div>
    <h1>Smart<span>Search</span></h1>
    <p class="sub">AI-powered semantic document search &amp; Q&amp;A. Ask anything in plain English — Endee finds what matters.</p>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('search')">🔍 Semantic Search</button>
    <button class="tab"        onclick="setMode('rag')"   >🤖 RAG Q&amp;A</button>
  </div>

  <!-- Search bar -->
  <div class="search-row">
    <div class="input-wrap">
      <input type="text" id="query" placeholder="e.g. how do vector databases work?" autocomplete="off" onkeydown="if(event.key==='Enter') doSearch()"/>
    </div>
    <button class="btn" id="searchBtn" onclick="doSearch()">Search</button>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat"><span class="stat-label">Index</span><span class="stat-value" id="sName">—</span></div>
    <div class="stat"><span class="stat-label">Documents</span><span class="stat-value" id="sCount">—</span></div>
    <div class="stat"><span class="stat-label">Dimensions</span><span class="stat-value" id="sDim">—</span></div>
    <div class="stat"><span class="stat-label">Precision</span><span class="stat-value" id="sPrec">—</span></div>
    <div class="stat"><span class="stat-label">Distance</span><span class="stat-value" id="sDist">—</span></div>
    <div class="stat"><span class="stat-label">Engine</span><span class="stat-value">Endee nD</span></div>
  </div>

  <!-- Results area -->
  <div id="results"></div>

</div>

<script>
let mode = 'search';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (m === 'search' && i === 0) || (m === 'rag' && i === 1));
  });
  document.getElementById('results').innerHTML = '';
  document.getElementById('query').placeholder =
    m === 'rag' ? 'e.g. What is the difference between RAG and fine-tuning?' : 'e.g. how do vector databases work?';
}

async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '...';

  document.getElementById('results').innerHTML = `
    <div class="loading"><div class="spinner"></div>Querying Endee...</div>`;

  try {
    const endpoint = mode === 'rag' ? '/api/rag' : '/api/search';
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query, top_k: 5}),
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    mode === 'rag' ? renderRAG(data) : renderSearch(data);
  } catch (e) {
    document.getElementById('results').innerHTML =
      `<div class="error-msg">❌ Error: ${e.message}. Is Endee running? Try: <code>docker compose up -d</code></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function scoreClass(s) {
  if (s >= 0.7) return 'score-high';
  if (s >= 0.4) return 'score-med';
  return 'score-low';
}

function renderSearch({results, query, count}) {
  if (!results || results.length === 0) {
    document.getElementById('results').innerHTML =
      `<div class="empty"><span class="empty-icon">◎</span>No results for "<em>${query}</em>".<br/>Try a different query or check data ingestion.</div>`;
    return;
  }

  let html = `<div class="results">`;
  results.forEach((r, i) => {
    const sc = parseFloat(r.similarity);
    html += `
      <div class="result-card" style="animation-delay:${i * 60}ms">
        <div class="card-header">
          <div class="card-title">${r.title}</div>
          <span class="score-pill ${scoreClass(sc)}">${(sc * 100).toFixed(1)}% match</span>
        </div>
        <div class="card-content">${r.content}</div>
        <div class="card-footer">
          <span class="cat-tag">${r.category}</span>
          <span class="doc-id">${r.id}</span>
        </div>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('results').innerHTML = html;
}

function renderRAG({answer, sources, query}) {
  const answerHtml = answer
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');

  let html = `
    <div class="rag-answer">
      <div class="rag-label">AI Generated Answer</div>
      <div class="rag-text">${answerHtml}</div>
    </div>`;

  if (sources && sources.length) {
    html += `<div class="sources-label">▸ Sources retrieved from Endee (${sources.length})</div>`;
    html += `<div class="results">`;
    sources.forEach((r, i) => {
      const sc = parseFloat(r.similarity);
      html += `
        <div class="result-card" style="animation-delay:${i * 60}ms">
          <div class="card-header">
            <div class="card-title">${r.title}</div>
            <span class="score-pill ${scoreClass(sc)}">${(sc * 100).toFixed(1)}% relevance</span>
          </div>
          <div class="card-content">${r.content}</div>
          <div class="card-footer">
            <span class="cat-tag">${r.category}</span>
            <span class="doc-id">${r.id}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('results').innerHTML = html;
}

// Load stats
async function loadStats() {
  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('sName').textContent  = data.name        || '—';
    document.getElementById('sCount').textContent = data.count ?? data.vectors_count ?? '—';
    document.getElementById('sDim').textContent   = data.dimension   || '384';
    document.getElementById('sPrec').textContent  = data.precision   || 'INT8';
    document.getElementById('sDist').textContent  = data.space_type  || 'cosine';
  } catch (_) {}
}

loadStats();
document.getElementById('query').focus();
</script>
</body>
</html>
